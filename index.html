<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ahmad 💜 Ryoko</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Trebuchet MS', system-ui, sans-serif;
  background:black;
  color:white;
}

#world{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,#ffb6c9,#43204a,#000);
}

#text{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:28px;
  transition:opacity .8s;
}

#poemBox{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity 1.5s;
}

#poemBox.show{
  opacity:1;
}

.poemCard{
  background:rgba(0,0,0,.6);
  padding:20px;
  border-radius:20px;
  max-width:600px;
}
</style>
</head>

<body>

<div id="world">
  <div id="text"></div>

  <div id="poemBox">
    <div class="poemCard">
      <div id="poemText"></div>
    </div>
  </div>
</div>

<script>
const text = document.getElementById("text");
const poemBox = document.getElementById("poemBox");
const poemText = document.getElementById("poemText");

const messages = [
  "En un mundo lleno de calabazas... 🎃",
  "Todo se siente más cálido cuando pienso en ti.",
  "Ryoko... 💜",
  "Cada paso contigo se vuelve algo bonito.",
  "Cada rincón se siente más suave si estás tú.",
  "Y hasta la noche parece más dulce a tu lado.",
  "Porque en este pequeño mundo...",
  "mi lugar favorito siempre será contigo."
];

const poem = `
Te elegiría a ti...<br><br>
una y otra vez 💜
`;

let i = 0;

function showText(msg){
  text.style.opacity = "0";
  setTimeout(()=>{
    text.innerHTML = msg;
    text.style.opacity = "1";
  },300);
}

function start(){
  showText(messages[0]);

  const interval = setInterval(()=>{
    i++;
    if(i < messages.length){
      showText(messages[i]);
    }else{
      clearInterval(interval);
    }
  },3200);

  /* ✅ FIXED TIMING */
  const totalDuration = messages.length * 3200;

  setTimeout(()=>{
    text.style.opacity = "0";

    poemText.innerHTML = poem;
    poemBox.classList.add("show");
  }, totalDuration + 1000);
}

start();
</script>

</body>
</html>
