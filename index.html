<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad 💜 Ryoko</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:black;
  color:white;
}

/* WORLD */
#world{
  position:fixed;
  inset:0;
  background:linear-gradient(#ffb6c9,#6a2a7a,#000);
  transition:2s;
}

#world.night{
  background:linear-gradient(#1e0a2e,#000);
}

/* MOON */
.moon{
  position:absolute;
  top:20px;
  right:20px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:white;
  opacity:0;
}
#world.night .moon{opacity:1;}

/* TEXT */
#text{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:22px;
}

/* PUMPKINS */
.pumpkin{
  position:absolute;
  width:30px;
  height:20px;
  background:orange;
  border-radius:50%;
}

/* CHARACTERS */
#walk{
  position:absolute;
  bottom:80px;
  width:100%;
}

.char{
  position:absolute;
  width:50px;
  height:100px;
  background:#fff;
  border-radius:20px;
}

#ahmad{
  left:-60px;
  animation:walk 10s forwards;
}
#ryoko{
  left:-120px;
  animation:walk 10s forwards;
}

@keyframes walk{
  to{left:45%;}
}

/* KISS */
.kiss{
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  opacity:0;
}

/* POEM */
#poem{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  transition:1s;
}

#poem.show{opacity:1;}

.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
}

/* HEARTS */
.heart{
  position:absolute;
  animation:float 4s linear forwards;
}
@keyframes float{
  to{transform:translateY(-200px);opacity:0;}
}

</style>
</head>

<body>

<div id="world">
  <div class="moon"></div>
  <div id="text"></div>

  <div id="walk">
    <div id="ahmad" class="char">A</div>
    <div id="ryoko" class="char">R</div>
  </div>

  <div id="kiss" class="kiss">💜💋💜</div>

  <div id="poem">
    <div class="card" id="poemText"></div>
  </div>
</div>

<script>

/* pumpkins */
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="pumpkin";
  p.style.left=Math.random()*100+"%";
  p.style.bottom=Math.random()*100+"px";
  document.body.appendChild(p);
}

/* messages */
let msgs=[
"En un mundo de calabazas 🎃",
"Todo se siente mejor contigo...",
"Ryoko 💜",
"Quiero caminar contigo siempre..."
];

let i=0;
let text=document.getElementById("text");

function next(){
  if(i<msgs.length){
    text.innerHTML=msgs[i];
    i++;
  }
}
setInterval(next,3000);

/* night */
setTimeout(()=>{
  document.getElementById("world").classList.add("night");
},5000);

/* kiss */
setTimeout(()=>{
  document.getElementById("kiss").style.opacity=1;
  if(navigator.vibrate) navigator.vibrate(200);
},10000);

/* poem */
setTimeout(()=>{
  document.getElementById("poem").classList.add("show");
  document.getElementById("poemText").innerHTML=
  "Ryoko... 💜<br><br>"+
  "En este mundo de calabazas,<br>"+
  encontré en ti algo único.<br><br>"+
  "Quiero descubrir todo contigo,<br>"+
  paso a paso... siempre.<br><br>"+
  "<b>Ahmad 🖤</b>";
},15000);

/* tap hearts */
document.addEventListener("click",(e)=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💜";
  h.style.left=e.clientX+"px";
  h.style.top=e.clientY+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
});

</script>

</body>
</html>
