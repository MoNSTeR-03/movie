<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad 💜 Ryoko</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:black;
  color:white;
}

/* world */
#world{
  position:fixed;
  inset:0;
  background:linear-gradient(#ffb6c9,#43204a,#000);
  transition:2s;
}

#world.night{
  background:linear-gradient(#2a103d,#000);
}

/* pumpkins */
.pumpkin{
  position:absolute;
  width:30px;
  height:20px;
  background:#ff8a1d;
  border-radius:50%;
}

/* stars */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:.5;
  animation:twinkle 3s infinite;
}
@keyframes twinkle{
  50%{opacity:1;}
}

/* text */
#text{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:22px;
}

/* hearts */
.heart{
  position:absolute;
  animation:float 4s linear forwards;
}
@keyframes float{
  to{transform:translateY(-200px);opacity:0;}
}

/* couple */
.couple{
  position:absolute;
  bottom:80px;
  left:-200px;
  animation:walk 10s forwards;
}

@keyframes walk{
  to{left:50%;}
}

/* poem */
#poem{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

#poem.show{ display:flex; }

.card{
  background:rgba(0,0,0,.6);
  padding:20px;
  border-radius:20px;
}

/* button */
#start{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="world"></div>

<button id="start" onclick="start()">Start 💜</button>

<div id="text"></div>

<div class="couple" id="couple">
  <div>👦 Ahmad 💙</div>
  <div>👧 Ryoko 💜</div>
</div>

<div id="poem">
  <div class="card">
    <h2>Para Ryoko 💜</h2>
    <p>
    En este mundo lleno de sueños y calma,<br>
    encontré en ti una luz para mi alma.<br><br>
    Cada paso contigo se vuelve mejor,<br>
    cada momento contigo se llena de amor.<br><br>
    Ryoko... siempre contigo.<br>
    — Ahmad 💜
    </p>
  </div>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
let text = document.getElementById("text");
let world = document.getElementById("world");
let poem = document.getElementById("poem");
let couple = document.getElementById("couple");

let msgs = [
"Un mundo lleno de calabazas 🎃",
"Y un chico llamado Ahmad...",
"Encontró a Ryoko 💜",
"Y todo se volvió especial..."
];

let i = 0;

function start(){
  document.getElementById("start").style.display="none";
  document.getElementById("music").play();
  next();
}

function next(){
  if(i < msgs.length){
    text.innerHTML = msgs[i];
    i++;
    setTimeout(next,2500);
  }else{
    world.classList.add("night");

    setTimeout(()=>{
      couple.style.left="45%";
      couple.style.transform="scale(1.2)";
      if(navigator.vibrate) navigator.vibrate(200);
    },2000);

    setTimeout(()=>{
      poem.classList.add("show");
    },6000);
  }
}

/* pumpkins */
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="pumpkin";
  p.style.left=Math.random()*100+"%";
  p.style.bottom=Math.random()*100+"px";
  document.getElementById("world").appendChild(p);
}

/* stars */
for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  document.getElementById("world").appendChild(s);
}

/* tap hearts */
document.addEventListener("click",e=>{
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💜";
    h.style.left=e.clientX+"px";
    h.style.top=e.clientY+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
});
</script>

</body>
</html>
