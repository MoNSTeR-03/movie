<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahmad 💜 Ryoko</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  overflow:hidden;
  font-family:'Trebuchet MS',sans-serif;
  background:black;
  color:white;
}

/* WORLD */
#world{
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom,#ffb6c9 0%,#d87bd6 40%,#2b0f30 100%);
  overflow:hidden;
  transition:3s;
}

#world.night{
  background:linear-gradient(to bottom,#2b1142 0%,#12081f 50%,#000 100%);
}

/* MOON */
.moon{
  position:absolute;
  top:60px;
  right:100px;
  width:100px;
  height:100px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 30px pink;
  opacity:0;
  transition:2s;
}

#world.night .moon{
  opacity:1;
}

/* STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0;
}

#world.night .star{
  opacity:1;
}

/* GROUND */
.ground{
  position:absolute;
  bottom:0;
  height:150px;
  width:100%;
  background:#120810;
}

/* 🎃 PUMPKINS EVERYWHERE */
.pumpkin{
  position:absolute;
  bottom:100px;
  width:40px;
  height:30px;
  background:#ff8a1d;
  border-radius:50%;
  box-shadow:0 0 10px orange;
}

.pumpkin::after{
  content:"";
  position:absolute;
  top:-8px;
  left:50%;
  width:5px;
  height:10px;
  background:green;
  transform:translateX(-50%);
}

/* CHARACTERS */
#walkScene{
  position:absolute;
  bottom:80px;
  width:100%;
}

.couple{
  position:absolute;
  left:-200px;
  animation:walk 12s forwards;
}

@keyframes walk{
  0%{left:-200px;}
  60%{left:45%;}
  100%{left:45%;}
}

.person{
  position:absolute;
  width:80px;
  height:150px;
}

.man{left:0;}
.girl{left:90px;}

.head{
  width:35px;
  height:40px;
  background:#f6d2bd;
  border-radius:50%;
  margin:auto;
}

/* GIRL HAIR FIX */
.girl .head::before{
  content:"";
  position:absolute;
  top:-6px;
  left:-4px;
  width:40px;
  height:20px;
  background:black;
  border-radius:50%;
}

/* BODY */
.body{
  width:30px;
  height:60px;
  background:#ff7dcf;
  margin:auto;
}

/* HEARTS */
.heart{
  position:absolute;
  animation:float 5s linear forwards;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-200px);opacity:0;}
}

/* SCREENS */
.screen{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
}

.screen.active{display:flex;}

.card{
  background:rgba(0,0,0,0.5);
  padding:30px;
  border-radius:20px;
}

button{
  padding:12px 20px;
  background:pink;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TEXT */
.text{
  position:absolute;
  top:60px;
  width:100%;
  text-align:center;
  font-size:28px;
  opacity:0;
  animation:fade 2s forwards;
}

@keyframes fade{
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="world">

<div class="moon"></div>

<div class="ground"></div>

<div id="decor"></div>

<div id="walkScene">
  <div id="couple" class="couple">
    <div class="person man">
      <div class="head"></div>
      <div class="body"></div>
    </div>
    <div class="person girl">
      <div class="head"></div>
      <div class="body"></div>
    </div>
  </div>
</div>

</div>

<!-- START -->
<div id="startScreen" class="screen active">
  <div class="card">
    <h2>Un mundo para Ryoko 🎃💜</h2>
    <button onclick="start()">Empezar 💜</button>
  </div>
</div>

<div id="text" class="text"></div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

const world=document.getElementById("world");
const text=document.getElementById("text");
const decor=document.getElementById("decor");
const music=document.getElementById("music");

/* CREATE MANY PUMPKINS */
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="pumpkin";
  p.style.left=Math.random()*100+"%";
  p.style.bottom=(80+Math.random()*60)+"px";
  decor.appendChild(p);
}

/* STARS */
for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  world.appendChild(s);
}

/* START */
function start(){
  music.play().catch(()=>{});
  document.getElementById("startScreen").classList.remove("active");
  startStory();
}

/* STORY */
let messages=[
"En un mundo lleno de calabazas 🎃",
"Todo se siente más cálido...",
"Porque tú estás aquí 💜",
"Ryoko...",
"Cada paso contigo es especial",
"Y cada lugar se vuelve nuestro",
"Ahmad 💜 Ryoko"
];

let i=0;

function startStory(){
  showText();
  setInterval(()=>{
    i++;
    if(i<messages.length){
      showText();
    }
  },3000);

  /* NIGHT + ROMANCE */
  setTimeout(()=>{
    world.classList.add("night");
  },5000);

  setTimeout(()=>{
    for(let i=0;i<30;i++){
      let h=document.createElement("div");
      h.className="heart";
      h.innerHTML="💜";
      h.style.left="50%";
      h.style.bottom="100px";
      world.appendChild(h);
      setTimeout(()=>h.remove(),4000);
    }
  },8000);
}

function showText(){
  text.innerHTML=messages[i];
}

</script>

</body>
</html>
